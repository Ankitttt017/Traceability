name: Traceability - Auto Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy Traceability
    runs-on: [self-hosted, Linux, X64]

    env:
      VITE_API_BASE_URL: http://192.168.100.136:9090/api/v1
      VITE_SOCKET_URL: http://192.168.100.136:9090
      DEPLOY_ROOT: /home/automation/apps/traceability

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy Frontend To Nginx Root
        run: rsync -av --delete frontend/dist/ "$DEPLOY_ROOT/frontend/dist/"

      - name: Verify Frontend Deployment
        run: test -f "$DEPLOY_ROOT/frontend/dist/index.html"

      - name: Deploy Backend Files
        run: |
          rsync -av --delete backend/ "$DEPLOY_ROOT/backend/" \
            --exclude node_modules \
            --exclude .env \
            --exclude "*.log"

      - name: Install Backend Dependencies
        working-directory: /home/automation/apps/traceability/backend
        run: npm ci

      - name: Restart Backend
        run: |
          pm2 restart traceability-backend --update-env
          pm2 save

      - name: Reload Nginx
        run: |
          sudo nginx -t
          sudo systemctl reload nginx